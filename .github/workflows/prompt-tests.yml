name: Prompt Tests

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

env:
  API_URL: https://lanelayer-analytics.fly.dev
  CODEX_SCORE_THRESHOLD: '6'
  CURSOR_SCORE_THRESHOLD: '5'

jobs:
  codex-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      score: ${{ steps.run.outputs.score }}
      passed: ${{ steps.run.outputs.passed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex simulation
        id: run
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          set +e
          RESULT=$(python3 prompt-tests/run_codex_sim.py --api-url "$API_URL" 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            printf "%s\n" "$RESULT" > prompt-tests/codex-report.txt
            echo "score=0" >> "$GITHUB_OUTPUT"
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "Codex simulation failed with exit code $EXIT_CODE"
            echo "$RESULT"
            exit 0
          fi

          printf "%s\n" "$RESULT" > prompt-tests/codex-report.json

          SCORE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('overall_score', 0))")
          echo "score=${SCORE}" >> "$GITHUB_OUTPUT"

          if python3 -c "exit(0 if float('${SCORE}') >= float('${{ env.CODEX_SCORE_THRESHOLD }}') else 1)"; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Codex score: ${SCORE} (threshold: ${{ env.CODEX_SCORE_THRESHOLD }})"

      - name: Upload Codex results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-results
          path: |
            prompt-tests/journey.log
            prompt-tests/codex-report.json
            prompt-tests/codex-report.txt
          if-no-files-found: ignore

  cursor-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      score: ${{ steps.run.outputs.score }}
      passed: ${{ steps.run.outputs.passed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Cursor CLI
        run: |
          curl -fsS https://cursor.com/install 2>/dev/null | bash || true
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Cursor simulation
        id: run
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set +e
          RESULT=$(python3 prompt-tests/run_cursor_sim.py --api-url "$API_URL" 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            printf "%s\n" "$RESULT" > prompt-tests/cursor-report.txt
            echo "score=0" >> "$GITHUB_OUTPUT"
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "Cursor simulation failed with exit code $EXIT_CODE"
            echo "$RESULT"
            exit 0
          fi

          printf "%s\n" "$RESULT" > prompt-tests/cursor-report.json

          SCORE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('overall_score', 0))")
          echo "score=${SCORE}" >> "$GITHUB_OUTPUT"

          if python3 -c "exit(0 if float('${SCORE}') >= float('${{ env.CURSOR_SCORE_THRESHOLD }}') else 1)"; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Cursor score: ${SCORE} (threshold: ${{ env.CURSOR_SCORE_THRESHOLD }})"

      - name: Upload Cursor results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cursor-results
          path: |
            prompt-tests/journey.log
            prompt-tests/cursor-report.json
            prompt-tests/cursor-report.txt
          if-no-files-found: ignore

  report:
    runs-on: ubuntu-latest
    needs: [codex-test, cursor-test]
    if: always()
    steps:
      - name: Download Codex results artifact
        if: always()
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: codex-results
          path: /tmp/codex-results

      - name: Download Cursor results artifact
        if: always()
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: cursor-results
          path: /tmp/cursor-results

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_ALERTS_WEBHOOK_URL }}
          CODEX_SCORE: ${{ needs.codex-test.outputs.score }}
          CODEX_PASSED: ${{ needs.codex-test.outputs.passed }}
          CURSOR_SCORE: ${{ needs.cursor-test.outputs.score }}
          CURSOR_PASSED: ${{ needs.cursor-test.outputs.passed }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")

          if [ "${CODEX_PASSED}" = "true" ]; then
            CODEX_EMOJI=":white_check_mark:"
          else
            CODEX_EMOJI=":x:"
          fi

          if [ "${CURSOR_PASSED}" = "true" ]; then
            CURSOR_EMOJI=":white_check_mark:"
          else
            CURSOR_EMOJI=":x:"
          fi

          if [ "${CODEX_PASSED}" = "true" ] && [ "${CURSOR_PASSED}" = "true" ]; then
            HEADER="Daily Prompt Tests PASSED"
          else
            HEADER="Daily Prompt Tests FAILED"
          fi

          CODEX_LOG_PATH="/tmp/codex-results/journey.log"
          CURSOR_LOG_PATH="/tmp/cursor-results/journey.log"
          export HEADER DATE RUN_URL CODEX_EMOJI CURSOR_EMOJI CODEX_LOG_PATH CURSOR_LOG_PATH

          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          def excerpt(path: str, max_chars: int = 1400, max_lines: int = 40) -> str:
              p = Path(path)
              if not p.exists():
                  return "No journey.log artifact found for this run."
              text = p.read_text(encoding="utf-8", errors="replace").strip()
              if not text:
                  return "journey.log exists but is empty."
              lines = text.splitlines()
              tail = "\n".join(lines[-max_lines:])
              if len(tail) > max_chars:
                  tail = tail[-max_chars:]
              return tail.strip() or "(no log excerpt available)"

          def parse_report(base_dir: str, engine: str) -> dict:
              p = Path(base_dir) / f"{engine}-report.json"
              if p.exists():
                  try:
                      return json.loads(p.read_text(encoding="utf-8", errors="replace"))
                  except Exception:
                      pass
              return {}

          def quality_text(engine: str, report: dict) -> str:
              if not report:
                  return (
                      f"*{engine.title()} quality*\n"
                      "No structured JSON report found."
                  )
              score = report.get("overall_score", "N/A")
              stop_reason = report.get("stop_reason", "unknown")
              last_step = report.get("last_step_reached", "unknown")
              turn_count = report.get("turn_count", "N/A")
              failures = report.get("notable_failures", [])[:3]
              failures_text = "\n".join(f"- {f}" for f in failures) if failures else "- none"
              return (
                  f"*{engine.title()} quality*\n"
                  f"- score: {score}/10\n"
                  f"- stop_reason: {stop_reason}\n"
                  f"- last_step_reached: {last_step}\n"
                  f"- turns: {turn_count}\n"
                  f"- top failures:\n{failures_text}"
              )

          def transcript_excerpt(report: dict, max_lines: int = 12, max_chars: int = 1400) -> str:
              transcript = report.get("transcript", []) if isinstance(report, dict) else []
              if not transcript:
                  return "No transcript available in report."
              lines = []
              for item in transcript[-max_lines:]:
                  role = str(item.get("role", "Agent"))
                  msg = str(item.get("message", "")).replace("`", "'").strip()
                  if not msg:
                      continue
                  lines.append(f"{role}: {msg}")
              text = "\n".join(lines).strip()
              if len(text) > max_chars:
                  text = text[-max_chars:]
              return text or "Transcript exists but excerpt is empty."

          header = os.getenv("HEADER", "Daily Prompt Tests")
          date = os.getenv("DATE", "")
          run_url = os.getenv("RUN_URL", "")
          codex_emoji = os.getenv("CODEX_EMOJI", ":x:")
          cursor_emoji = os.getenv("CURSOR_EMOJI", ":x:")

          codex_report = parse_report("/tmp/codex-results", "codex")
          cursor_report = parse_report("/tmp/cursor-results", "cursor")

          codex_quality = quality_text("codex", codex_report)
          cursor_quality = quality_text("cursor", cursor_report)
          codex_transcript = transcript_excerpt(codex_report)
          cursor_transcript = transcript_excerpt(cursor_report)

          codex_text = excerpt("/tmp/codex-results/journey.log")
          cursor_text = excerpt("/tmp/cursor-results/journey.log")

          payload = {
              "text": f"{header} ({date})",
              "blocks": [
                  {
                      "type": "header",
                      "text": {"type": "plain_text", "text": f"{header} - {date}"},
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"{codex_emoji} *Codex*"},
                          {"type": "mrkdwn", "text": f"{cursor_emoji} *Cursor*"},
                      ],
                  },
                  {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": codex_quality},
                  },
                  {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": cursor_quality},
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*Codex transcript excerpt*\n```{codex_transcript}```",
                      },
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*Cursor transcript excerpt*\n```{cursor_transcript}```",
                      },
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*Codex journey.log excerpt*\n```{codex_text}```",
                      },
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*Cursor journey.log excerpt*\n```{cursor_text}```",
                      },
                  },
                  {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": f"<{run_url}|View full workflow run and artifacts>"},
                  },
              ],
          }

          Path("/tmp/slack-payload.json").write_text(json.dumps(payload), encoding="utf-8")
          PY

          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            curl -sf -X POST -H "Content-Type: application/json" \
              -d @/tmp/slack-payload.json "${SLACK_WEBHOOK_URL}"
            echo ""
            echo "Slack notification sent to #lanelayer-alerts"
          else
            echo "WARNING: SLACK_ALERTS_WEBHOOK_URL not set, skipping Slack notification"
          fi

